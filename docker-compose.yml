version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: leaozinho_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leaozinho
      POSTGRES_PASSWORD: leaozinho123
      POSTGRES_DB: leaozinho_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leaozinho -d leaozinho_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: leaozinho_redis
    restart: unless-stopped
    command: redis-server --requirepass leaozinho_redis_pass --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'leaozinho_redis_pass', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: leaozinho_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@leaozinho.com.br
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
